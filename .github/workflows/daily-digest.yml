name: Daily Blog Digest

on:
  schedule:
    # 毎日 UTC 15:00 (JST 00:00) に実行
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      article_limit:
        description: '取得する記事数'
        required: false
        default: '5'
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and summarize new articles
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python summarize.py ${{ github.event.inputs.article_limit || '5' }}

      - name: Generate static site
        working-directory: scripts
        run: python generate_site.py

      - name: Check for changes
        id: check
        run: |
          git diff --quiet data/articles.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git commit -m "Update articles data [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
